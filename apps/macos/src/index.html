<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Desktop</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    h1 { margin-top: 0; }
    p { color: #666; }
    button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🦞 OpenClaw</h1>
    <p>Welcome to OpenClaw Desktop.</p>
    <p>The gateway is running at http://localhost:18789</p>
    <button onclick="window.location.href='http://localhost:18789'">Open Web Chat</button>
  </div>
</body>
</html>
